<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>S.H Department of SafeKeeping</title>
</head>
<body>

    <header>
        <div class="header-top">
            <div class="logo-section">
                <div class="logo-circle">DOS</div>
                <div class="agency-name">S.H Department of <br><strong>SafeKeeping</strong></div>
            </div>
        </div>
    </header>

    <nav>
        <ul>
            <li><a href="#">About</a></li>
            <li><a href="#">Our Work</a></li>
            <li><a href="#">Resources</a></li>
        </ul>
    </nav>

    <div class="search-container">
        
        <div id="view-list">
            <div class="search-bar">
                <input type="text" id="user-search" placeholder="Search datasets (e.g. RNFDS0001)">
                <button>🔍</button>
            </div>
            <div class="search-tabs">
                <div class="tab active"><a style="text-decoration: none; color: black;" href="./index.html">All Nodes</a></div>
                <div class="tab"><a style="text-decoration: none; color: black;" href="./shfiles.html">S.H Files</a></div>
                <div class="tab"><a style="text-decoration: none; color: black;" href="./narayan.html">Narayan Files</a></div>
            </div>
            <div class="results-count">0 results</div>
            
            <div id="articles-list"></div>
        </div>

        <div id="view-article" style="display: none;">
            <button class="back-btn" onclick="window.location.hash = ''" style="background:none; border:none; color:#485696; font-weight:bold; cursor:pointer; margin-bottom:20px; padding:0;">← Back to Results</button>
            
            <div id="full-content" style="background: white; padding: 40px; border: 1px solid #d6d6d6; border-radius: 4px;">
            </div>
        </div>

    </div>

    <script>
        // ADD NEW ARTICLES HERE
        const articleDatabase = [
            {
                id: "RNFDS0001",
                title: "RNFDS001.pdf - Dataset",
                summary: "This document contains a conversation between Narayan and Raditya.",
                pdfUrl: "files/RNFDS001.pdf"
            },
            {
                id: "RNFDS0002",
                title: "RNFDS002.pdf - Dataset",
                summary: "Raditya's Hatred against his personal home ISP.",
                pdfUrl: "files/RNFDS002.pdf"
            },
            {
                id: "RNFDS0003",
                title: "RNFIS003.pdf - Dataset",
                summary: "Connections of S.H Higher Elites, including Narayan and Raditya.",
                content: "<h1>Elite Connections</h1><p>Detailed map of Narayan and Raditya's influence.</p>"
            },
            {
                id: "RNFDS0004",
                title: "RNFDS004.pdf - Dataset",
                summary: "Connections of S.H Higher Elites, including Narayan and Raditya.",
                pdfUrl: "files/RNFDS004.pdf"
            },
            {
                id: "RNFDS0005",
                title: "RNFVS005.mkv - Dataset",
                summary: "Connections of S.H Higher Elites, including Narayan and Raditya.",
                content: "<h1>Elite Connections</h1><p>Detailed map of Narayan and Raditya's influence.</p>"
            },
            {
                id: "RNFDS0006",
                title: "RNFIS006.pdf - Dataset",
                summary: "Connections of S.H Higher Elites, including Narayan and Raditya.",
                content: "<h1>Elite Connections</h1><p>Detailed map of Narayan and Raditya's influence.</p>"
            },
        ];

        const listDiv = document.getElementById('articles-list');
        const searchInput = document.getElementById('user-search');

        function renderResults() {
            const query = searchInput.value.toLowerCase();
            const filtered = articleDatabase.filter(a => a.title.toLowerCase().includes(query) || a.summary.toLowerCase().includes(query));
            
            document.querySelector('.results-count').textContent = `${filtered.length} results`;
            
            // Updated to use the clean lines style (searchable-article)
            listDiv.innerHTML = filtered.map(a => `
                <div class="searchable-article">
                    <h3><a href="#${a.id}">${a.title}</a></h3>
                    <p>${a.summary}</p>
                </div>
            `).join('');
        }

        function handleRouting() {
            const hash = window.location.hash.replace('#', '');
            if (hash) {
                const article = articleDatabase.find(a => a.id === hash);
                if (article) {
                    document.getElementById('view-list').style.display = 'none';
                    document.getElementById('view-article').style.display = 'block';
                    document.getElementById('full-content').innerHTML = article.content; // This now matches the HTML!
                    window.scrollTo(0, 0); // Scrolls back to the top when an article opens
                }
            } else {
                document.getElementById('view-list').style.display = 'block';
                document.getElementById('view-article').style.display = 'none';
                renderResults();
            }
        }

        searchInput.addEventListener('input', renderResults);
        window.addEventListener('hashchange', handleRouting);
        window.onload = handleRouting;
    </script>
</body>
</html>
